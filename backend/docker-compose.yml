services:
  postgres_db:
    image: pgvector/pgvector:pg16
    container_name: ms_postgres
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  profile_service:
    build: ./services/profile_service
    container_name: ms_profile_service
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=Profile Service
      - API_PREFIX=/api/profile
      - DB_SCHEMA=profile
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:${POSTGRES_PORT}/${POSTGRES_DB}
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8001:8000"
    volumes:
      - ./services/profile_service:/app
    depends_on:
      - postgres_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  riasec_service:
    build: ./services/riasec_service
    container_name: ms_riasec_service
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=RIASEC Service
      - API_PREFIX=/api/riasec
      - DB_SCHEMA=riasec
      - PROFILE_SERVICE_URL=http://profile_service:8000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:${POSTGRES_PORT}/${POSTGRES_DB}
      - MIN_RIASEC_STEPS=5
      - MAX_RIASEC_STEPS=7
      - DOMINANT_GAP_THRESHOLD=0.2
      - CONFIDENCE_THRESHOLD=0.75
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8002:8000"
    volumes:
      - ./services/riasec_service:/app
    depends_on:
      - postgres_db
      - profile_service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  admission_service:
    build: ./services/admission_service
    container_name: ms_admission_service
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=Admission Service
      - API_PREFIX=/api/admission
      - DB_SCHEMA=admission
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:${POSTGRES_PORT}/${POSTGRES_DB}
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8003:8000"
    volumes:
      - ./services/admission_service:/app
    depends_on:
      - postgres_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  rag_service:
    build: ./services/rag_service
    container_name: ms_rag_service
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=RAG Service
      - API_PREFIX=/api/rag
      - DB_SCHEMA=rag
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:${POSTGRES_PORT}/${POSTGRES_DB}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8004:8000"
    volumes:
      - ./services/rag_service:/app
      - chroma_data:/app/chroma_data
    depends_on:
      - postgres_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  api_gateway:
    build: ./api_gateway
    container_name: ms_api_gateway
    restart: always
    env_file: .env
    environment:
      - PROFILE_SERVICE_URL=http://profile_service:8000
      - RIASEC_SERVICE_URL=http://riasec_service:8000
      - ADMISSION_SERVICE_URL=http://admission_service:8000
      - RAG_SERVICE_URL=http://rag_service:8000
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8000:8000"
    volumes:
      - ./api_gateway:/app
    depends_on:
      - profile_service
      - riasec_service
      - admission_service
      - rag_service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  chroma_data:

networks:
  default:
    name: ai_admission_network